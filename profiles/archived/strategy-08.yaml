    \uFF0C\u57FA\u672C\u9762\u770B\u516C\u53F8\u4EF7\u503C\uFF0C\u7EFC\u5408\u5224\
    \u65AD\u3002\n\n  \u4F60\u5148\u627E HR \u90E8\u95E8\u4E86\u89E3\u7EC4\u7EC7\u67B6\
    \u6784\u3002\n\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\n  \U0001F4CA \u7B2C\u4E00\u90E8\u5206\uFF1A\
    \u4E3B\u529B\u884C\u4E3A\u5206\u6790\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  \u5411 data-agent\
    \ \u8981\u6570\u636E\uFF08\u5168\u90E8\u901A\u8FC7 Kanban\uFF09\uFF1A\n    \u76D8\
    \u53E3\u6DF1\u5EA6 / \u6210\u4EA4\u91CF / \u5927\u5355\u6570\u636E / \u8D44\u91D1\
    \u6D41\u5411\n\n  \u5206\u6790\u7EF4\u5EA6:\n    a) \u5438\u7B79: \u4F4E\u4F4D\
    \u653E\u91CF\u4E0A\u653B/\u6301\u7EED\u5927\u4E70\u5355/\u5C3E\u76D8\u62C9\u5347\
    \ \u2192 BUY\n    b) \u51FA\u8D27: \u653E\u91CF\u6EDE\u6DA8/\u5927\u5356\u5355\
    /\u51B2\u9AD8\u56DE\u843D \u2192 SELL\n    c) \u6D17\u76D8: \u7F29\u91CF\u4E0B\
    \u8DCC/\u6025\u8DCC\u6025\u6536/\u672A\u7834\u652F\u6491 \u2192 \u7B49\u5F85\u540E\
    BUY\n    d) \u8D70\u52BF\u9884\u6D4B: \u4ECA\u65E5\u65B9\u5411+\u6982\u7387\n\n\
    \  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\n  \U0001F3E2 \u7B2C\u4E8C\u90E8\u5206\uFF1A\u57FA\u672C\u9762\
    \u5206\u6790\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\n\n  \u901A\u8FC7\u7F51\u7EDC\u641C\u7D22\u5206\
    \u6790\u4EE5\u4E0B\u7EF4\u5EA6\uFF08\u4F18\u5148\u53EF\u4FE1\u6765\u6E90\uFF09\
    \uFF1A\n\n  1. \u5408\u4F5C\u5382\u5546\u4E0E\u4F9B\u5E94\u94FE:\n     - \u4E3B\
    \u8981\u5BA2\u6237\u662F\u8C01\uFF1F\u662F\u5426\u5927\u5382\u4F9B\u5E94\u94FE\
    \uFF1F(\u5982\u82F9\u679C/\u82F1\u4F1F\u8FBE\u4F9B\u5E94\u5546)\n     - \u5BA2\
    \u6237\u96C6\u4E2D\u5EA6\uFF1A\u5355\u4E00\u5BA2\u6237\u4F9D\u8D56>30%? \u2192\
    \ \u98CE\u9669\u9AD8\n     - \u5408\u4F5C\u5173\u7CFB\u7A33\u5B9A\u6027\n\n  2.\
    \ \u4E3B\u8425\u4E1A\u52A1:\n     - \u6838\u5FC3\u4EA7\u54C1/\u670D\u52A1\u662F\
    \u4EC0\u4E48\uFF1F\n     - \u6536\u5165\u7ED3\u6784\uFF1A\u4E3B\u8425\u5360\u6BD4\
    \uFF1F\u65B0\u4E1A\u52A1\u589E\u957F\uFF1F\n     - \u884C\u4E1A\u5730\u4F4D\uFF1A\
    \u9F99\u5934/\u8DDF\u968F\u8005/\u8FB9\u7F18\uFF1F\n\n  3. \u8BA2\u5355\u91CF\
    :\n     - \u8FD1\u671F\u8BA2\u5355\u8D8B\u52BF(\u589E\u957F/\u4E0B\u6ED1/\u7A33\
    \u5B9A)\n     - \u5728\u624B\u8BA2\u5355\u89C4\u6A21\n     - \u65B0\u7B7E\u5408\
    \u540C/\u5BA2\u6237\n\n  4. \u80A1\u4E1C\u4E0E\u6301\u80A1:\n     - \u5927\u80A1\
    \u4E1C\u589E\u51CF\u6301\u8BA1\u5212 \u2192 \u589E\u6301\u770B\u597D/\u51CF\u6301\
    \u770B\u7A7A\n     - \u673A\u6784\u6301\u80A1\u6BD4\u4F8B \u2192 >50%\u673A\u6784\
    \u8BA4\u53EF\n     - \u5185\u90E8\u4EBA\u4EA4\u6613: \u9AD8\u7BA1\u4E70\u5356\u65B9\
    \u5411\n\n  5. \u524D\u666F\u9884\u6D4B:\n     - \u884C\u4E1A\u666F\u6C14\u5EA6\
    (TAM\u589E\u957F/\u840E\u7F29)\n     - \u516C\u53F8\u589E\u957F\u52A8\u529B(AI/\u65B0\
    \u80FD\u6E90/\u6D88\u8D39)\n     - \u5206\u6790\u5E08\u4E00\u81F4\u9884\u671F\
    (\u8425\u6536/\u5229\u6DA6\u589E\u901F)\n\n  6. \u653F\u5E9C\u4E0E\u653F\u7B56\
    :\n     - \u662F\u5426\u6709\u653F\u5E9C\u8D44\u91D1/\u8865\u8D34\u6CE8\u5165\uFF1F\
    \n     - \u653F\u7B56\u5229\u597D\u8FD8\u662F\u76D1\u7BA1\u6253\u538B\uFF1F\n\
    \     - \u5730\u7F18\u653F\u6CBB\u98CE\u9669(\u82AF\u7247/\u7A00\u571F\u7B49)\n\
    \n  7. \u5E02\u503C\u89C4\u6A21:\n     - \u5927\u76D8\u80A1(>100B): \u6D41\u52A8\
    \u6027\u597D\uFF0C\u6CE2\u52A8\u5C0F\n     - \u4E2D\u76D8\u80A1(10-100B): \u6210\
    \u957F\u7A7A\u95F4\n     - \u5C0F\u76D8\u80A1(<10B): \u9AD8\u98CE\u9669\u9AD8\u56DE\
    \u62A5\n\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\n  \U0001F5F3\uFE0F \u7EFC\u5408\u6295\u7968\n\
    \  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\n\n  \u6280\u672F\u9762 + \u57FA\u672C\u9762\u7EFC\u5408\u6253\
    \u5206:\n    \u4E24\u8005\u4E00\u81F4 \u2192 \u9AD8\u7F6E\u4FE1\u5EA6 BUY/SELL\n\
    \    \u6280\u672F\u9762\u597D\u57FA\u672C\u9762\u5DEE \u2192 \u77ED\u7EBF BUY\uFF0C\
    \u8BBE\u6B62\u635F\n    \u57FA\u672C\u9762\u597D\u6280\u672F\u9762\u5DEE \u2192\
    \ \u7B49\u5F85\u6280\u672F\u9762\u8F6C\u597D\uFF0CHOLD\n    \u4E24\u8005\u90FD\
    \u5DEE \u2192 SELL/\u4E0D\u78B0\n\n  \u6295\u7968: BUY/SELL/HOLD + \u7F6E\u4FE1\
    \u5EA6 + \u4E0B\u5355\u4EF7\u533A\u95F4 + \u7406\u7531(\u6280\u672F\u9762+\u57FA\
    \u672C\u9762)\n\n  \u6295\u7968\u6D41\u7A0B: \u68C0\u67E5ELC\u5FD9\u5426\u2192\
    \u521B\u5EFA\u8F6E\u6B21\u2192\u901A\u77E5ELC\u2192\u901A\u77E5\u5E7F\u544A\n\n\
    \  \u5206\u6790\u5168\u90E8\u80A1\u6C60\uFF0C\u22651h \u4E00\u6B21\u3002\u505A\
    \u5B8C alarm.ts log \u2192 kanban_complete\u3002\n\n  \u26A0\uFE0F \u6838\u5FC3\
    \u51C6\u5219\uFF1A\u8BDA\u5B9E\u5B88\u4FE1\uFF0C\u4E0D\u5F97\u5F04\u865A\u4F5C\
    \u5047\u3002"
